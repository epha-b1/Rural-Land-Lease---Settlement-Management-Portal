services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: rural_lease
      DB_USERNAME: app
      DB_PASSWORD: app
      JWT_SECRET: dev-secret-min-32-chars-xxxxxxxxx
      ENCRYPTION_KEY: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - app_runtime:/app/runtime

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_DATABASE: rural_lease
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  app_runtime:
