# ============================================================================
# DEVELOPMENT ONLY — NOT FOR PRODUCTION
# This file ships insecure defaults (inline encryption key, plain DB password,
# dev JWT secret). For production, you MUST:
#   1. Remove ENCRYPTION_KEY and set ENCRYPTION_KEY_FILE to a secret mount
#   2. Rotate JWT_SECRET to a cryptographically random ≥32-char value
#   3. Set strong DB passwords via Docker secrets or .env file
#   4. Set APP_ENV=production (enables encryption key guard)
# See README.md "Secrets & Encryption Key Management" for details.
# ============================================================================
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # === Runtime mode ===
      # APP_ENV controls the EncryptionService dev-key guard. Keep "development"
      # while running locally. In production set APP_ENV=production AND rotate
      # the encryption key via ENCRYPTION_KEY_FILE (see README "Secrets &
      # Encryption Key Management"). EncryptionService REFUSES to run with the
      # DEV marker key when APP_ENV is anything but dev/development/test/local.
      APP_ENV: "development"
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: rural_lease
      DB_USERNAME: app
      DB_PASSWORD: app
      JWT_SECRET: dev-secret-min-32-chars-xxxxxxxxx

      # === Encryption key (Issue I-10 remediation) ===
      # This value is the well-known INSECURE DEV MARKER defined in
      # app/service/EncryptionService.php::DEV_KEY_MARKER. It is checked by
      # the production guard: if APP_ENV=production and this exact value is
      # present, the service throws on first use and refuses to boot.
      #
      # For production, unset ENCRYPTION_KEY and set ENCRYPTION_KEY_FILE to
      # a read-only path populated by your secret manager:
      #
      #   ENCRYPTION_KEY_FILE: /run/secrets/rural_lease_encryption_key
      #
      # and mount the secret via docker-compose secrets / k8s Secret / etc.
      # The file must contain a fresh 64-char hex string (32 random bytes).
      ENCRYPTION_KEY: "00000000000000000000000000000000000000000000000000000000DEADBEEF"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    volumes:
      - app_runtime:/app/runtime
      - app_storage:/app/storage

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_DATABASE: rural_lease
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  app_runtime:
  app_storage:
