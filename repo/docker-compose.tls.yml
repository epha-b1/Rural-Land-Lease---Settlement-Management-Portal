# TLS profile for local intranet deployment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.tls.yml up --build -d
#
# Adds an nginx TLS terminator in front of the PHP API container. Self-signed
# certificates are generated on first run by the `tls-init` service if
# storage/tls/ is empty. The prompt requires "local TLS when deployed on an
# intranet" — this compose overlay satisfies that requirement without changing
# the dev defaults (plain HTTP on :8000).
#
# After `up`, the portal is available at https://localhost:8443 .

services:
  tls-init:
    image: alpine:3.19
    volumes:
      - ./storage/tls:/tls
    command: >
      sh -c '
        if [ ! -f /tls/cert.pem ] || [ ! -f /tls/key.pem ]; then
          apk add --no-cache openssl > /dev/null 2>&1 &&
          openssl req -x509 -nodes -newkey rsa:4096
            -keyout /tls/key.pem
            -out /tls/cert.pem
            -days 365
            -subj "/C=US/ST=Local/L=Local/O=RuralLeasePortal/CN=localhost" &&
          chmod 644 /tls/cert.pem /tls/key.pem
        else
          echo "TLS cert already present, skipping generation"
        fi
      '

  tls:
    image: nginx:1.25-alpine
    depends_on:
      tls-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    ports:
      - "8443:443"
    volumes:
      - ./storage/tls:/etc/nginx/tls:ro
      - ./storage/tls/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
