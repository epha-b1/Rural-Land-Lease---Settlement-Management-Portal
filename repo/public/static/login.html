<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rural Land Lease Portal</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card layui-card">
            <div class="layui-card-header auth-header">
                <h2>Rural Land Lease Portal</h2>
                <p>Sign in to your account</p>
            </div>
            <div class="layui-card-body">
                <form class="layui-form" id="login-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label">Username</label>
                        <div class="layui-input-block">
                            <input type="text" name="username" required autocomplete="username"
                                   placeholder="Enter username" class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">Password</label>
                        <div class="layui-input-block">
                            <input type="password" name="password" required autocomplete="current-password"
                                   placeholder="Enter password" class="layui-input">
                        </div>
                    </div>
                    <!-- MFA field, hidden by default -->
                    <div class="layui-form-item layui-hide" id="mfa-field">
                        <label class="layui-form-label">MFA Code</label>
                        <div class="layui-input-block">
                            <input type="text" name="totp_code" maxlength="6" pattern="[0-9]{6}"
                                   placeholder="6-digit code" class="layui-input">
                        </div>
                    </div>
                    <!-- CAPTCHA field (required by backend) -->
                    <div class="layui-form-item">
                        <label class="layui-form-label">Verify</label>
                        <div class="layui-input-inline" style="width: 120px;">
                            <input type="text" readonly id="captcha-question" class="layui-input"
                                   placeholder="Loading..." style="background:#f2f2f2;cursor:default;">
                        </div>
                        <div class="layui-input-inline" style="width: 150px;">
                            <input type="text" name="captcha_answer" id="captcha-answer" required
                                   placeholder="Answer" class="layui-input" autocomplete="off">
                        </div>
                        <button type="button" id="captcha-refresh" class="layui-btn layui-btn-sm layui-btn-primary"
                                title="Refresh CAPTCHA">
                            <i class="layui-icon layui-icon-refresh"></i>
                        </button>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-input-block">
                            <button type="submit" class="layui-btn layui-btn-fluid" lay-submit lay-filter="login">
                                Sign In
                            </button>
                        </div>
                    </div>
                </form>
                <div class="auth-footer">
                    <a href="/static/register.html">Create an account</a>
                </div>
                <div class="auth-message layui-hide" id="auth-message"></div>
            </div>
        </div>
    </div>

    <script src="/static/layui/layui.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
